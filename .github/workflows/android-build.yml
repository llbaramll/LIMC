plugins {
    id 'com.android.application'
}

android {
    namespace 'com.mobilelimc.limcv10'
    compileSdk 34

    // 1. 서명 설정을 가장 먼저 정의합니다.
    signingConfigs {
        release {
            storeFile file("my-release-key.jks")
            storePassword "limc1234!"
            keyAlias "mobilelimc-alias"
            keyPassword "limc1234!"
        }
    }

    defaultConfig {
        applicationId "com.mobilelimc.limcv10"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            // 2. 릴리즈 빌드할 때 위에서 정의한 서명(release)을 반드시 쓰도록 강제 연결합니다.
            signingConfig signingConfigs.release 
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
}
