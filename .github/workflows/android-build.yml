name: Android LIMC Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Create app directory
        run: mkdir -p app

      - name: Generate Keystore
        run: keytool -genkeypair -v -keystore app/my-release-key.jks -alias mobilelimc-alias -keyalg RSA -keysize 2048 -validity 10000 -storepass "limc1234!" -keypass "limc1234!" -dname "CN=LIMC, OU=Mobile, O=LIMC, L=Seoul, ST=Seoul, C=KR"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.2'

      - name: Build AAB and APK
        run: gradle bundleRelease assembleRelease

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: LIMC-Release-AAB
          path: app/build/outputs/bundle/release/*.aab

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LIMC-Test-APK
          path: app/build/outputs/apk/release/*.apk
