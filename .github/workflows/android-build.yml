name: Android LIMC App Build (AAB & APK)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 소스코드 가져오기
      uses: actions/checkout@v4

    - name: 자바 환경 설정 (JDK 17)
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle'

    - name: 구글 출시용 서명키(Keystore) 자동 생성
      run: |
        mkdir -p app
        keytool -genkeypair -v -keystore app/my-release-key.jks -alias mobilelimc-alias -keyalg RSA -keysize 2048 -validity 10000 -storepass "limc1234!" -keypass "limc1234!" -dname "CN=LIMC, OU=Mobile, O=LIMC, L=Seoul, ST=Seoul, C=KR"

    - name: Gradle 환경 자동 세팅
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.2'

    - name: 출시용 AAB 및 테스트용 APK 동시 빌드
      run: gradle bundleRelease assembleRelease

    - name: [출시용] AAB 파일 저장
      uses: actions/upload-artifact@v4
      with:
        name: LIMC-Release-AAB
        path: app/build/outputs/bundle/release/*.aab

    - name: [폰 테스트용] APK 파일 저장
      uses: actions/upload-artifact@v4
      with:
        name: LIMC-Test-APK
        path: app/build/outputs/apk/release/*.apk
